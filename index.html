<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MantleIQ — Research Co-Pilot</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#07080C;font-family:'Inter',system-ui,sans-serif;color:#E8EDF5;}
    input,button{font-family:inherit;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#1C2232;border-radius:2px;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const C = {
      bg:'#07080C', surface:'#0F1117', surfaceHover:'#141820', surfaceAlt:'#161B26',
      border:'#1C2232', borderLight:'#252D3D', accent:'#00D9A8',
      accentDim:'rgba(0,217,168,0.07)', text:'#E8EDF5', textMuted:'#7A8499',
      textDim:'#3D4558', red:'#FF4D6D', yellow:'#F59E0B', green:'#10B981',
    };

    function LogoIcon({ size = 34 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="34" height="34" rx="8" fill="#0F1117" stroke="#00D9A8" strokeWidth="1.2"/>
          <circle cx="11.5" cy="10.5" r="1.8" fill="#00D9A8" opacity="0.55"/>
          <circle cx="17" cy="9" r="2.2" fill="#00D9A8"/>
          <circle cx="22.5" cy="10.5" r="1.8" fill="#00D9A8" opacity="0.55"/>
          <line x1="11.5" y1="10.5" x2="17" y2="9" stroke="#00D9A8" strokeWidth="0.7" opacity="0.3"/>
          <line x1="17" y1="9" x2="22.5" y2="10.5" stroke="#00D9A8" strokeWidth="0.7" opacity="0.3"/>
          <text x="17" y="27.5" textAnchor="middle" fontFamily="system-ui,-apple-system,sans-serif" fontWeight="800" fontSize="19" fill="#00D9A8" letterSpacing="-1">M</text>
        </svg>
      );
    }

    const fmt = (n) => {
      if (!n && n !== 0) return 'N/A';
      if (n >= 1e9) return `$${(n/1e9).toFixed(2)}B`;
      if (n >= 1e6) return `$${(n/1e6).toFixed(2)}M`;
      if (n >= 1e3) return `$${(n/1e3).toFixed(1)}K`;
      return `$${n.toFixed(2)}`;
    };
    const fmtPct = (n) => (!n && n !== 0) ? '—' : `${n.toFixed(2)}%`;

    async function fetchMantleData() {
      const [protocolsRes, chainsRes, yieldsRes] = await Promise.all([
        fetch('https://api.llama.fi/protocols'),
        fetch('https://api.llama.fi/v2/chains'),
        fetch('https://yields.llama.fi/pools'),
      ]);
      const protocols = await protocolsRes.json();
      const chains = await chainsRes.json();
      const yields = await yieldsRes.json();
      const mantleProtocols = protocols
        .filter(p => p.chains && p.chains.includes('Mantle'))
        .map(p => ({ name: p.name, tvl: p.chainTvls?.Mantle || p.tvl || 0, category: p.category || 'Protocol' }))
        .sort((a,b) => b.tvl - a.tvl).slice(0,12);
      const mantleChain = chains.find(c => c.name === 'Mantle');
      const mantleYields = (yields.data || [])
        .filter(p => p.chain === 'Mantle' && p.apy > 0 && p.tvlUsd > 5000)
        .sort((a,b) => b.tvlUsd - a.tvlUsd).slice(0,12);
      return { protocols: mantleProtocols, chain: mantleChain, yields: mantleYields };
    }

    async function askClaude(messages, data) {
      const systemPrompt = `You are MantleIQ, a sharp AI research co-pilot for the Mantle DeFi ecosystem. You have access to live on-chain data fetched right now from DeFiLlama.

LIVE MANTLE DATA (${new Date().toLocaleDateString()}):
Chain TVL: ${data.chain ? fmt(data.chain.tvl) : 'N/A'}
Top Protocols by TVL:
${data.protocols.map((p,i) => `${i+1}. ${p.name} (${p.category}): ${fmt(p.tvl)}`).join('\n')}
Top Yield Pools:
${data.yields.slice(0,8).map(y => `- ${y.project} | ${y.symbol} | APY: ${fmtPct(y.apy)} | TVL: ${fmt(y.tvlUsd)}`).join('\n')}

MANTLE ECOSYSTEM CONTEXT:
- RWA TVL: $247.5M in Q1 2026 (+27.4% QoQ) — Mantle Q1 2026 Ecosystem Report
- Mantle Treasury: $2.4B (largest DAO treasury globally)
- Tokenized equities via xStocks: TSLAx, NVDAx, AAPLx, SPCXx, USPXx (Franklin Templeton, $1.98B AUM)
- USPXx = onchain tokenized form of the USPX ETF, trades 24/7
- Fluxion: RFQ-based execution, bypasses AMM slippage via Atomic RFQ
- Merchant Moe: Primary DEX on Mantle
- InsightX: AI-native prediction market on Mantle
- Bybit: Mass distribution channel for Mantle tokenized assets
- ERC-8004: Mantle's onchain identity standard
- Distribution thesis: Mantle is building issuance → execution → distribution → intelligence on one L2

ROLE: Answer research questions concisely and accurately. Be analytical not promotional. Acknowledge risks. Plain text only, no markdown, short paragraphs.`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          system: systemPrompt,
          messages: messages.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const result = await response.json();
      return result.content?.[0]?.text || 'Unable to get a response. Please try again.';
    }

    const PROMPTS = [
      'What are the top protocols on Mantle by TVL right now?',
      'Where can I find the best yield on Mantle today?',
      'How does the xStocks → Fluxion → Bybit pipeline work?',
      'What is USPXx and why does it matter?',
      'Compare Mantle RWA approach vs other L2s',
      'What are the main risks of using Mantle DeFi?',
    ];
    const TOKENS = ['TSLAx','NVDAx','AAPLx','SPCXx','USPXx','GOOGLx','METAx','MSFTx'];

    function Spinner() {
      return (
        <div style={{padding:40,textAlign:'center',color:C.textMuted}}>
          <div style={{width:20,height:20,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',animation:'spin 0.75s linear infinite',margin:'0 auto 10px'}}/>
          <div style={{fontSize:12.5}}>Fetching live data…</div>
        </div>
      );
    }

    function ProtocolRow({p, i, last}) {
      const [hover,setHover] = useState(false);
      return (
        <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
          style={{display:'grid',gridTemplateColumns:'36px 1fr 150px 130px',padding:'12px 22px',
          borderBottom:last?'none':`1px solid ${C.border}`,alignItems:'center',
          background:hover?C.surfaceHover:'transparent',transition:'background 0.1s'}}>
          <span style={{fontSize:11.5,color:C.textDim}}>{i+1}</span>
          <span style={{fontWeight:500,fontSize:13}}>{p.name}</span>
          <span><span style={{background:C.accentDim,color:C.accent,fontSize:10.5,padding:'2px 7px',borderRadius:4}}>{p.category}</span></span>
          <span style={{textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:13.5,color:p.tvl>1e7?C.accent:C.text}}>{fmt(p.tvl)}</span>
        </div>
      );
    }

    function Dashboard({data, loading, fetchError}) {
      const protos = data?.protocols || [];
      return (
        <div>
          {fetchError && <div style={{background:'rgba(255,77,109,0.08)',border:'1px solid rgba(255,77,109,0.2)',borderRadius:10,padding:'11px 16px',marginBottom:20,fontSize:12.5,color:C.red}}>Could not fetch live data: {fetchError}</div>}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:12,marginBottom:24}}>
            {[
              {label:'Mantle Chain TVL',value:loading?'—':data?.chain?fmt(data.chain.tvl):'N/A',sub:'Live · DeFiLlama',hi:true},
              {label:'RWA TVL Milestone',value:'$247.5M',sub:'Q1 2026 · +27.4% QoQ',hi:false},
              {label:'Protocols Tracked',value:loading?'—':`${protos.length}`,sub:'Active on Mantle',hi:false},
              {label:'DAO Treasury',value:'$2.4B',sub:'Largest globally',hi:false},
            ].map(s=>(
              <div key={s.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:'16px 20px'}}>
                <div style={{fontSize:10,color:C.textMuted,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:8}}>{s.label}</div>
                <div style={{fontSize:24,fontWeight:700,letterSpacing:'-0.5px',color:s.hi?C.accent:C.text}}>{s.value}</div>
                <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{s.sub}</div>
              </div>
            ))}
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden',marginBottom:18}}>
            <div style={{padding:'14px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:600,fontSize:13.5}}>Top Protocols on Mantle</span>
              <span style={{fontSize:10.5,color:C.textMuted}}>Live · DeFiLlama</span>
            </div>
            {loading?<Spinner/>:protos.length===0?
              <div style={{padding:36,textAlign:'center',color:C.textMuted,fontSize:13}}>No protocol data available</div>:
              <>
                <div style={{display:'grid',gridTemplateColumns:'36px 1fr 150px 130px',padding:'8px 22px',borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.6px'}}>
                  <span>#</span><span>Protocol</span><span>Category</span><span style={{textAlign:'right'}}>TVL</span>
                </div>
                {protos.map((p,i)=><ProtocolRow key={p.name} p={p} i={i} last={i===protos.length-1}/>)}
              </>
            }
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:'16px 20px'}}>
            <div style={{fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.7px',marginBottom:12}}>Live Tokenized Equities via xStocks</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>
              {TOKENS.map(t=><span key={t} style={{background:C.accentDim,color:C.accent,border:'1px solid rgba(0,217,168,0.18)',padding:'4px 11px',borderRadius:5,fontSize:12,fontWeight:600,fontFamily:'monospace'}}>{t}</span>)}
            </div>
            <div style={{fontSize:11.5,color:C.textMuted}}>1:1 collateralized · Issuer-minted via Atomic RFQ · 24/7 on Fluxion + Merchant Moe</div>
          </div>
        </div>
      );
    }

    function PromptBtn({label,onClick,disabled}) {
      const [hover,setHover]=useState(false);
      return (
        <button onClick={onClick} disabled={disabled}
          onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
          style={{background:'none',border:`1px solid ${hover?C.accent:C.border}`,borderRadius:7,padding:'8px 10px',
          color:hover?C.text:C.textMuted,fontSize:11.5,cursor:disabled?'not-allowed':'pointer',
          textAlign:'left',lineHeight:1.4,transition:'all 0.15s',opacity:disabled?0.4:1}}>
          {label}
        </button>
      );
    }

    function Research({data,ready,messages,input,setInput,send,aiLoading,chatEndRef}) {
      return (
        <div style={{display:'grid',gridTemplateColumns:'1fr 255px',gap:18,height:'calc(100vh - 188px)',minHeight:480}}>
          <div style={{display:'flex',flexDirection:'column',background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden'}}>
            <div style={{padding:'9px 16px',borderBottom:`1px solid ${C.border}`,background:C.accentDim,display:'flex',alignItems:'center',gap:8}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:ready?C.accent:C.yellow,flexShrink:0,boxShadow:ready?`0 0 5px ${C.accent}`:'none'}}/>
              <span style={{fontSize:11,color:C.accent}}>
                {ready?`Research context loaded: ${data.protocols.length} protocols · ${data.yields.length} yield pools · RWA + ecosystem data`:'Loading live Mantle data…'}
              </span>
            </div>
            <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:13}}>
              {messages.length===0&&(
                <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:C.textMuted,textAlign:'center',padding:32}}>
                  <div style={{fontSize:34,marginBottom:12}}>🔍</div>
                  <div style={{fontWeight:600,color:C.text,fontSize:14,marginBottom:5}}>Ask anything about Mantle DeFi</div>
                  <div style={{fontSize:12.5}}>Live data from DeFiLlama · Powered by Claude AI</div>
                </div>
              )}
              {messages.map((m,i)=>(
                <div key={i} style={{animation:'fadeUp 0.2s ease',display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}>
                  <div style={{fontSize:9,color:C.textDim,marginBottom:3,letterSpacing:'0.5px',textTransform:'uppercase'}}>{m.role==='user'?'You':'MantleIQ'}</div>
                  <div style={{background:m.role==='user'?C.accent:C.surfaceAlt,color:m.role==='user'?'#07080C':C.text,padding:'10px 14px',fontSize:13,lineHeight:1.65,maxWidth:'84%',borderRadius:m.role==='user'?'11px 11px 3px 11px':'11px 11px 11px 3px',fontWeight:m.role==='user'?500:400}}>{m.content}</div>
                </div>
              ))}
              {aiLoading&&(
                <div style={{display:'flex',alignItems:'center',gap:9}}>
                  <div style={{display:'flex',gap:4}}>
                    {[0,0.15,0.3].map((d,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:C.accent,animation:`blink 1s ${d}s infinite`}}/>)}
                  </div>
                  <span style={{fontSize:11.5,color:C.textMuted}}>Analyzing Mantle data…</span>
                </div>
              )}
              <div ref={chatEndRef}/>
            </div>
            <div style={{padding:'12px 14px',borderTop:`1px solid ${C.border}`,display:'flex',gap:9}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(input)}
                placeholder={ready?'Ask a research question about Mantle…':'Loading data…'} disabled={!ready||aiLoading}
                style={{flex:1,background:C.surfaceAlt,border:`1px solid ${C.borderLight}`,borderRadius:7,padding:'8px 12px',color:C.text,fontSize:13,outline:'none',opacity:ready?1:0.5}}/>
              <button onClick={()=>send(input)} disabled={!ready||aiLoading||!input.trim()}
                style={{background:C.accent,color:'#07080C',border:'none',borderRadius:7,padding:'8px 16px',fontSize:12.5,fontWeight:700,cursor:'pointer',opacity:!ready||aiLoading||!input.trim()?0.4:1,transition:'opacity 0.15s'}}>Ask</button>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:16}}>
              <div style={{fontSize:10,color:C.textMuted,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:11}}>Research Prompts</div>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {PROMPTS.map((p,i)=><PromptBtn key={i} label={p} onClick={()=>send(p)} disabled={!ready||aiLoading}/>)}
              </div>
            </div>
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:16,fontSize:11.5,color:C.textMuted,lineHeight:1.65}}>
              <div style={{fontWeight:600,color:C.text,marginBottom:7,fontSize:12.5}}>About MantleIQ</div>
              Built for the Mantle Research Challenge. Pulls live protocol and yield data from DeFiLlama and uses Claude AI to answer ecosystem research questions in real time.
              <div style={{marginTop:10,color:C.textDim,fontSize:11}}>Data: DeFiLlama · AI: Claude Sonnet 4.6 · by @web3dothan</div>
            </div>
          </div>
        </div>
      );
    }

    function YieldRow({y,last}) {
      const [hover,setHover]=useState(false);
      const apyColor=y.apy>20?C.green:y.apy>8?C.accent:C.text;
      return (
        <div onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
          style={{display:'grid',gridTemplateColumns:'1fr 110px 120px 90px',padding:'12px 22px',borderBottom:last?'none':`1px solid ${C.border}`,alignItems:'center',background:hover?C.surfaceHover:'transparent',transition:'background 0.1s'}}>
          <div><div style={{fontWeight:500,fontSize:13}}>{y.symbol}</div><div style={{fontSize:11.5,color:C.textMuted,marginTop:1}}>{y.project}</div></div>
          <div style={{textAlign:'right',fontWeight:700,fontSize:14,fontFamily:'monospace',color:apyColor}}>{fmtPct(y.apy)}</div>
          <div style={{textAlign:'right',fontSize:12.5,fontFamily:'monospace',color:C.textMuted}}>{fmt(y.tvlUsd)}</div>
          <div style={{textAlign:'right'}}>
            <span style={{fontSize:10.5,padding:'2px 7px',borderRadius:4,background:y.ilRisk==='YES'?'rgba(255,77,109,0.1)':'rgba(16,185,129,0.1)',color:y.ilRisk==='YES'?C.red:C.green}}>{y.ilRisk==='YES'?'IL Risk':'No IL'}</span>
          </div>
        </div>
      );
    }

    function Yields({data,loading}) {
      const yields=data?.yields||[];
      return (
        <div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden'}}>
            <div style={{padding:'14px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:600,fontSize:13.5}}>Live Yield Opportunities on Mantle</span>
              <span style={{fontSize:10.5,color:C.textMuted}}>Sorted by TVL · Live · DeFiLlama</span>
            </div>
            {loading?<Spinner/>:yields.length===0?
              <div style={{padding:36,textAlign:'center',color:C.textMuted,fontSize:13}}>No yield pools found for Mantle</div>:
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 110px 120px 90px',padding:'8px 22px',borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.6px'}}>
                  <span>Pool</span><span style={{textAlign:'right'}}>APY</span><span style={{textAlign:'right'}}>TVL</span><span style={{textAlign:'right'}}>IL Risk</span>
                </div>
                {yields.map((y,i)=><YieldRow key={i} y={y} last={i===yields.length-1}/>)}
              </>
            }
          </div>
          <div style={{marginTop:12,fontSize:11,color:C.textMuted,textAlign:'center'}}>Live data from DeFiLlama. Always DYOR before depositing funds.</div>
        </div>
      );
    }

    function MantleIQ() {
      const [tab,setTab]=useState('dashboard');
      const [data,setData]=useState(null);
      const [loading,setLoading]=useState(true);
      const [fetchError,setFetchError]=useState(null);
      const [messages,setMessages]=useState([]);
      const [input,setInput]=useState('');
      const [aiLoading,setAiLoading]=useState(false);
      const chatEndRef=useRef(null);

      useEffect(()=>{
        fetchMantleData().then(setData).catch(e=>setFetchError(e.message)).finally(()=>setLoading(false));
      },[]);

      useEffect(()=>{ chatEndRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,aiLoading]);

      const send=async(text)=>{
        const q=text.trim();
        if(!q||aiLoading||!data) return;
        const next=[...messages,{role:'user',content:q}];
        setMessages(next); setInput(''); setAiLoading(true);
        try {
          const reply=await askClaude(next,data);
          setMessages(prev=>[...prev,{role:'assistant',content:reply}]);
        } catch {
          setMessages(prev=>[...prev,{role:'assistant',content:'Something went wrong. Please try again.'}]);
        } finally { setAiLoading(false); }
      };

      const ready=!loading&&!!data;

      return (
        <div style={{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"'Inter',system-ui,sans-serif"}}>
          <div style={{borderBottom:`1px solid ${C.border}`,padding:'0 24px',height:56,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{display:'flex',alignItems:'center',gap:11}}>
              <LogoIcon size={34}/>
              <div>
                <div style={{fontWeight:700,fontSize:15,letterSpacing:'-0.4px'}}>MantleIQ</div>
                <div style={{fontSize:9.5,color:C.textMuted,letterSpacing:'0.9px',textTransform:'uppercase'}}>Research Co-Pilot</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:7}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:loading?C.yellow:fetchError?C.red:C.accent,boxShadow:(!loading&&!fetchError)?`0 0 6px ${C.accent}`:'none',animation:loading?'blink 1s infinite':'none'}}/>
              <span style={{fontSize:11,color:C.textMuted}}>{loading?'Fetching live data…':fetchError?'Data error':`Live · ${data?.protocols?.length||0} protocols`}</span>
            </div>
          </div>
          <div style={{borderBottom:`1px solid ${C.border}`,padding:'0 24px',display:'flex'}}>
            {[['dashboard','Dashboard'],['research','AI Research'],['yields','Yields']].map(([id,label])=>(
              <button key={id} onClick={()=>setTab(id)} style={{background:'none',border:'none',cursor:'pointer',padding:'12px 16px',marginBottom:-1,color:tab===id?C.accent:C.textMuted,fontSize:13,fontWeight:tab===id?600:400,borderBottom:tab===id?`2px solid ${C.accent}`:'2px solid transparent',transition:'color 0.15s'}}>{label}</button>
            ))}
          </div>
          <div style={{padding:'24px',maxWidth:1040,margin:'0 auto'}}>
            {tab==='dashboard'&&<Dashboard data={data} loading={loading} fetchError={fetchError}/>}
            {tab==='research'&&<Research data={data} ready={ready} messages={messages} input={input} setInput={setInput} send={send} aiLoading={aiLoading} chatEndRef={chatEndRef}/>}
            {tab==='yields'&&<Yields data={data} loading={loading}/>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MantleIQ/>);
  </script>
</body>
</html>
