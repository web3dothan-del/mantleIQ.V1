<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MantleIQ — Research Co-Pilot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#07080C;font-family:'Inter',system-ui,sans-serif;color:#E8EDF5;}
input,button,select,a{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#1C2232;border-radius:2px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes flowDot{0%{transform:translateY(0);opacity:0}15%{opacity:1}85%{opacity:1}100%{transform:translateY(22px);opacity:0}}
@keyframes nodePulse{0%,100%{box-shadow:0 0 0 0 rgba(0,217,168,0.4)}70%{box-shadow:0 0 0 8px rgba(0,217,168,0)}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:300px}}
.tab-nav{overflow-x:auto;display:flex;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.tab-nav::-webkit-scrollbar{height:0;}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#1C2232;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#00D9A8;cursor:pointer;}
select{background:#161B26;border:1px solid #252D3D;color:#E8EDF5;padding:8px 12px;border-radius:7px;width:100%;outline:none;font-size:13px;cursor:pointer;}
select option{background:#161B26;}
.node-card{transition:all 0.2s;cursor:pointer;}
.node-card:hover{transform:translateX(3px);}
.proto-row{cursor:pointer;transition:background 0.1s;}
.proto-row:hover{background:#141820;}
.ext-link{color:#7A8499;text-decoration:none;font-size:12px;padding:2px 4px;border-radius:3px;transition:color 0.15s;}
.ext-link:hover{color:#00D9A8;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const C={bg:'#07080C',surface:'#0F1117',surfaceHover:'#141820',surfaceAlt:'#161B26',
  border:'#1C2232',borderLight:'#252D3D',accent:'#00D9A8',accentDim:'rgba(0,217,168,0.07)',
  text:'#E8EDF5',textMuted:'#7A8499',textDim:'#3D4558',
  red:'#FF4D6D',redDim:'rgba(255,77,109,0.08)',yellow:'#F59E0B',yellowDim:'rgba(245,158,11,0.08)',green:'#10B981',greenDim:'rgba(16,185,129,0.08)'};

const PALETTE=['#00D9A8','#4D8EFF','#F59E0B','#FF4D6D','#A78BFA','#34D399','#FB923C','#38BDF8'];

const fmt=(n)=>{if(!n&&n!==0)return'N/A';if(n>=1e9)return`$${(n/1e9).toFixed(2)}B`;if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}K`;return`$${n.toFixed(2)}`;};
const fmtPct=(n)=>(!n&&n!==0)?'—':`${n.toFixed(2)}%`;
const fmtChg=(n)=>n===null||n===undefined?null:`${n>=0?'+':''}${n.toFixed(1)}%`;

/* ─── RISK ENGINE ─── */
function getRisk(p){
  const alerts=[];
  if(p.tvl<500000)alerts.push({level:'high',msg:'Very low TVL (<$500K) — limited liquidity and higher exit risk'});
  else if(p.tvl<2000000)alerts.push({level:'medium',msg:'Low TVL (<$2M) — limited liquidity depth'});
  if(p.change7d!==null&&p.change7d<-30)alerts.push({level:'high',msg:`TVL dropped ${Math.abs(p.change7d).toFixed(1)}% in 7 days — significant outflows`});
  else if(p.change7d!==null&&p.change7d<-15)alerts.push({level:'medium',msg:`TVL declined ${Math.abs(p.change7d).toFixed(1)}% in 7 days`});
  const audits=parseInt(p.audits)||0;
  if(audits===0)alerts.push({level:'medium',msg:'No audits listed on DeFiLlama — smart contract risk unverified'});
  const level=alerts.some(a=>a.level==='high')?'high':alerts.some(a=>a.level==='medium')?'medium':'low';
  return{level,alerts};
}

function getYieldRisk(y){
  const alerts=[];
  if(y.apy>200)alerts.push({level:'high',msg:'Extremely high APY — likely unsustainable, possible smart contract or token risk'});
  else if(y.apy>50)alerts.push({level:'medium',msg:'High APY — verify sustainability and token emission schedule'});
  if(y.ilRisk==='YES')alerts.push({level:'medium',msg:'Impermanent loss risk — price divergence between paired assets can reduce returns'});
  if(y.tvlUsd<50000)alerts.push({level:'high',msg:'Very low pool TVL — exit liquidity risk if multiple users withdraw'});
  else if(y.tvlUsd<200000)alerts.push({level:'medium',msg:'Low pool TVL — limited exit liquidity'});
  const level=alerts.some(a=>a.level==='high')?'high':alerts.some(a=>a.level==='medium')?'medium':'low';
  return{level,alerts};
}

/* ─── RISK BADGE ─── */
function RiskBadge({level,small}){
  const cfg={high:{bg:C.redDim,color:C.red,label:'● High'},medium:{bg:C.yellowDim,color:C.yellow,label:'● Med'},low:{bg:C.greenDim,color:C.green,label:'● Low'}};
  const c=cfg[level]||cfg.low;
  return(<span style={{background:c.bg,color:c.color,fontSize:small?9.5:10,padding:'2px 7px',borderRadius:4,fontWeight:600,letterSpacing:'0.2px'}}>{c.label}</span>);
}

/* ─── LOGO ─── */
function LogoIcon({size=34}){return(<svg width={size} height={size} viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="34" height="34" rx="8" fill="#0F1117" stroke="#00D9A8" strokeWidth="1.2"/><circle cx="11.5" cy="10.5" r="1.8" fill="#00D9A8" opacity="0.55"/><circle cx="17" cy="9" r="2.2" fill="#00D9A8"/><circle cx="22.5" cy="10.5" r="1.8" fill="#00D9A8" opacity="0.55"/><line x1="11.5" y1="10.5" x2="17" y2="9" stroke="#00D9A8" strokeWidth="0.7" opacity="0.3"/><line x1="17" y1="9" x2="22.5" y2="10.5" stroke="#00D9A8" strokeWidth="0.7" opacity="0.3"/><text x="17" y="27.5" textAnchor="middle" fontFamily="system-ui,-apple-system,sans-serif" fontWeight="800" fontSize="19" fill="#00D9A8" letterSpacing="-1">M</text></svg>);}

function Spinner(){return(<div style={{padding:40,textAlign:'center',color:C.textMuted}}><div style={{width:20,height:20,border:`2px solid ${C.border}`,borderTopColor:C.accent,borderRadius:'50%',animation:'spin 0.75s linear infinite',margin:'0 auto 10px'}}/><div style={{fontSize:12.5}}>Fetching live data…</div></div>);}

/* ─── DATA FETCH ─── */
async function fetchMantleData(){
  const[protocolsRes,chainsRes,yieldsRes]=await Promise.all([fetch('https://api.llama.fi/protocols'),fetch('https://api.llama.fi/v2/chains'),fetch('https://yields.llama.fi/pools')]);
  const protocols=await protocolsRes.json();const chains=await chainsRes.json();const yields=await yieldsRes.json();
  const mantleProtocols=protocols
    .filter(p=>p.chains&&p.chains.includes('Mantle'))
    .map(p=>({
      name:p.name,tvl:p.chainTvls?.Mantle||p.tvl||0,category:p.category||'Protocol',
      url:p.url||null,change7d:p.change_7d??null,audits:p.audits??0,
      description:p.description||null,
      defilamaSlug:p.slug||p.name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''),
    }))
    .sort((a,b)=>b.tvl-a.tvl).slice(0,12);
  const mantleChain=chains.find(c=>c.name==='Mantle');
  const mantleYields=(yields.data||[]).filter(p=>p.chain==='Mantle'&&p.apy>0&&p.tvlUsd>5000).sort((a,b)=>b.tvlUsd-a.tvlUsd).slice(0,12);
  return{protocols:mantleProtocols,chain:mantleChain,yields:mantleYields};
}

/* ─── CLAUDE API ─── */
async function askClaude(messages,data){
  const systemPrompt=`You are MantleIQ, a sharp AI research co-pilot for the Mantle DeFi ecosystem. Live DeFiLlama data (${new Date().toLocaleDateString()}):
Chain TVL: ${data.chain?fmt(data.chain.tvl):'N/A'}
Top Protocols: ${data.protocols.map((p,i)=>`${i+1}. ${p.name} (${p.category}): ${fmt(p.tvl)}${p.change7d!==null?` 7d:${p.change7d>=0?'+':''}${p.change7d?.toFixed(1)}%`:''}`).join(', ')}
Top Yields: ${data.yields.slice(0,5).map(y=>`${y.project} ${y.symbol}: ${fmtPct(y.apy)} APY`).join(', ')}
Context: RWA TVL $247.5M Q1 2026 (+27.4% QoQ). Treasury $2.4B. xStocks equities: TSLAx NVDAx AAPLx SPCXx USPXx. Fluxion (RFQ), Merchant Moe (DEX), InsightX (AI prediction), Bybit (distribution). ERC-8004 identity.
Be analytical, accurate, concise. Plain text only. No markdown.`;
  const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:systemPrompt,messages:messages.map(m=>({role:m.role,content:m.content}))})});
  const result=await response.json();
  return result.content?.[0]?.text||'Unable to get a response.';
}

const PROMPTS=['What are the top protocols on Mantle by TVL right now?','Where is the best yield on Mantle today?','How does xStocks → Fluxion → Bybit work?','What is USPXx and why does it matter?','Compare Mantle RWA vs other L2s','What are the main risks of Mantle DeFi?'];
const TOKENS=['TSLAx','NVDAx','AAPLx','SPCXx','USPXx','GOOGLx','METAx','MSFTx'];

/* ─── PROTOCOL ROW (with links + risk) ─── */
function ProtocolRow({p,i,last}){
  const[expanded,setExpanded]=useState(false);
  const risk=getRisk(p);
  const chg=fmtChg(p.change7d);
  const defilamaUrl=`https://defillama.com/protocol/${p.defilamaSlug}`;

  return(<div style={{borderBottom:last&&!expanded?'none':`1px solid ${C.border}`}}>
    <div className="proto-row" onClick={()=>setExpanded(e=>!e)}
      style={{display:'grid',gridTemplateColumns:'32px 1fr 65px 60px 110px',padding:'11px 22px',alignItems:'center',background:expanded?C.surfaceAlt:'transparent'}}>
      <span style={{fontSize:11,color:C.textDim}}>{i+1}</span>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <span style={{fontWeight:500,fontSize:13}}>{p.name}</span>
        {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" className="ext-link" onClick={e=>e.stopPropagation()} title={`Visit ${p.name}`}>↗</a>}
      </div>
      <div><RiskBadge level={risk.level}/></div>
      <span style={{fontSize:11,color:p.change7d===null?C.textDim:p.change7d>=0?C.green:C.red,fontFamily:'monospace'}}>{chg||'—'}</span>
      <span style={{textAlign:'right',fontFamily:'monospace',fontWeight:700,fontSize:13,color:p.tvl>1e7?C.accent:C.text}}>{fmt(p.tvl)}</span>
    </div>
    {expanded&&<div style={{padding:'10px 22px 14px 56px',background:C.surfaceAlt,borderBottom:`1px solid ${C.border}`,animation:'slideDown 0.2s ease'}}>
      {p.description&&<div style={{fontSize:12,color:C.textMuted,lineHeight:1.6,marginBottom:10}}>{p.description}</div>}
      {risk.level==='low'
        ?<div style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:C.green,marginBottom:8}}><span>✓</span><span>No major risk flags identified for this protocol</span></div>
        :risk.alerts.map((a,j)=>(
          <div key={j} style={{display:'flex',alignItems:'flex-start',gap:7,fontSize:12,color:a.level==='high'?C.red:C.yellow,marginBottom:6,lineHeight:1.5}}>
            <span style={{flexShrink:0,marginTop:1}}>⚠</span><span>{a.msg}</span>
          </div>
        ))
      }
      <div style={{display:'flex',gap:12,marginTop:10}}>
        <a href={defilamaUrl} target="_blank" rel="noopener noreferrer" style={{color:C.accent,fontSize:11.5,textDecoration:'none'}}>View on DeFiLlama ↗</a>
        {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" style={{color:C.textMuted,fontSize:11.5,textDecoration:'none'}}>Official Site ↗</a>}
      </div>
    </div>}
  </div>);
}

/* ─── DASHBOARD ─── */
function Dashboard({data,loading,fetchError}){
  const protos=data?.protocols||[];
  const highRisk=protos.filter(p=>getRisk(p).level==='high');
  const medRisk=protos.filter(p=>getRisk(p).level==='medium');
  const[showAlerts,setShowAlerts]=useState(true);

  return(<div>
    {fetchError&&<div style={{background:C.redDim,border:'1px solid rgba(255,77,109,0.2)',borderRadius:10,padding:'11px 16px',marginBottom:16,fontSize:12.5,color:C.red}}>{fetchError}</div>}

    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:12,marginBottom:20}}>
      {[{label:'Chain TVL',value:loading?'—':data?.chain?fmt(data.chain.tvl):'N/A',sub:'Live · DeFiLlama',hi:true},{label:'RWA TVL Milestone',value:'$247.5M',sub:'Q1 2026 · +27.4% QoQ'},{label:'Protocols Tracked',value:loading?'—':`${protos.length}`,sub:'Active on Mantle'},{label:'DAO Treasury',value:'$2.4B',sub:'Largest globally'}].map(s=>(
        <div key={s.label} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:'16px 20px'}}>
          <div style={{fontSize:10,color:C.textMuted,letterSpacing:'0.7px',textTransform:'uppercase',marginBottom:8}}>{s.label}</div>
          <div style={{fontSize:24,fontWeight:700,letterSpacing:'-0.5px',color:s.hi?C.accent:C.text}}>{s.value}</div>
          <div style={{fontSize:11,color:C.textMuted,marginTop:4}}>{s.sub}</div>
        </div>
      ))}
    </div>

    {/* Risk Alerts Panel */}
    {!loading&&protos.length>0&&(highRisk.length>0||medRisk.length>0)&&(
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden',marginBottom:18}}>
        <div onClick={()=>setShowAlerts(v=>!v)} style={{padding:'12px 22px',borderBottom:showAlerts?`1px solid ${C.border}`:'none',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:13,fontWeight:600}}>Risk Overview</span>
            {highRisk.length>0&&<span style={{background:C.redDim,color:C.red,fontSize:10.5,padding:'2px 8px',borderRadius:4,fontWeight:600}}>{highRisk.length} High</span>}
            {medRisk.length>0&&<span style={{background:C.yellowDim,color:C.yellow,fontSize:10.5,padding:'2px 8px',borderRadius:4,fontWeight:600}}>{medRisk.length} Medium</span>}
          </div>
          <span style={{color:C.textMuted,fontSize:12}}>{showAlerts?'▲':'▼'}</span>
        </div>
        {showAlerts&&<div style={{padding:'14px 22px',display:'flex',flexDirection:'column',gap:10}}>
          {[...highRisk,...medRisk].map(p=>{
            const risk=getRisk(p);
            return(<div key={p.name} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <RiskBadge level={risk.level}/>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                  <span style={{fontWeight:500,fontSize:13}}>{p.name}</span>
                  {p.url&&<a href={p.url} target="_blank" rel="noopener noreferrer" className="ext-link" onClick={e=>e.stopPropagation()}>↗</a>}
                  <span style={{fontSize:11,color:C.textMuted}}>{fmt(p.tvl)}</span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:3}}>
                  {risk.alerts.slice(0,2).map((a,j)=>(
                    <div key={j} style={{fontSize:11.5,color:a.level==='high'?C.red:C.yellow,lineHeight:1.5}}>⚠ {a.msg}</div>
                  ))}
                </div>
              </div>
            </div>);
          })}
          <div style={{fontSize:11,color:C.textDim,borderTop:`1px solid ${C.border}`,paddingTop:10,marginTop:2}}>Risk flags are based on TVL size, 7-day TVL change, and audit status from DeFiLlama. Always verify independently before using any protocol.</div>
        </div>}
      </div>
    )}

    {/* Protocol Table */}
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden',marginBottom:18}}>
      <div style={{padding:'14px 22px',borderBottom:`1px solid ${C.border}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontWeight:600,fontSize:13.5}}>Top Protocols on Mantle</span>
        <span style={{fontSize:10.5,color:C.textMuted}}>Click any row for risk details + links · Live · DeFiLlama</span>
      </div>
      {loading?<Spinner/>:protos.length===0?<div style={{padding:36,textAlign:'center',color:C.textMuted}}>No data</div>:<>
        <div style={{display:'grid',gridTemplateColumns:'32px 1fr 65px 60px 110px',padding:'8px 22px',borderBottom:`1px solid ${C.border}`,fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.6px'}}>
          <span>#</span><span>Protocol</span><span>Risk</span><span>7d</span><span style={{textAlign:'right'}}>TVL</span>
        </div>
        {protos.map((p,i)=><ProtocolRow key={p.name} p={p} i={i} last={i===protos.length-1}/>)}
      </>}
    </div>

    {/* Tokenized equities */}
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:'16px 20px'}}>
      <div style={{fontSize:10,color:C.textMuted,textTransform:'uppercase',letterSpacing:'0.7px',marginBottom:12}}>Live Tokenized Equities via xStocks</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>{TOKENS.map(t=><span key={t} style={{background:C.accentDim,color:C.accent,border:'1px solid rgba(0,217,168,0.18)',padding:'4px 11px',borderRadius:5,fontSize:12,fontWeight:600,fontFamily:'monospace'}}>{t}</span>)}</div>
      <div style={{fontSize:11.5,color:C.textMuted}}>1:1 collateralized · Atomic RFQ · 24/7 on Fluxion + Merchant Moe ·&nbsp;
        <a href="https://xstocks.fi" target="_blank" rel="noopener noreferrer" style={{color:C.accent,textDecoration:'none'}}>xstocks.fi ↗</a>
      </div>
    </div>
  </div>);
}

/* ─── AI RESEARCH ─── */
function Research({data,ready,messages,input,setInput,send,aiLoading,chatEndRef}){
  return(<div style={{display:'grid',gridTemplateColumns:'1fr 255px',gap:18,height:'calc(100vh - 188px)',minHeight:480}}>
    <div style={{display:'flex',flexDirection:'column',background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,overflow:'hidden'}}>
      <div style={{padding:'9px 16px',borderBottom:`1px solid ${C.border}`,background:C.accentDim,display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:6,height:6,borderRadius:'50%',background:ready?C.accent:C.yellow,boxShadow:ready?`0 0 5px ${C.accent}`:'none'}}/>
        <span style={{fontSize:11,color:C.accent}}>{ready?`Context loaded: ${data.protocols.length} protocols · ${data.yields.length} yield pools`:'Loading live data…'}</span>
      </div>
      <div style={{flex:1,overflow:'auto',padding:16,display:'flex',flexDirection:'column',gap:13}}>
        {messages.length===0&&<div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:C.textMuted,textAlign:'center',padding:32}}><div style={{fontSize:34,marginBottom:12}}>🔍</div><div style={{fontWeight:600,color:C.text,fontSize:14,marginBottom:5}}>Ask anything about Mantle DeFi</div><div style={{fontSize:12.5}}>Live DeFiLlama data · Claude AI</div></div>}
        {messages.map((m,i)=>(<div key={i} style={{animation:'fadeUp 0.2s ease',display:'flex',flexDirection:'column',alignItems:m.role==='user'?'flex-end':'flex-start'}}><div style={{fontSize:9,color:C.textDim,marginBottom:3,letterSpacing:'0.5px',textTransform:'uppercase'}}>{m.role==='user'?'You':'MantleIQ'}</div><div style={{background:m.role==='user'?C.accent:C.surfaceAlt,color:m.role==='user'?'#07080C':C.text,padding:'10px 14px',fontSize:13,lineHeight:1.65,maxWidth:'84%',borderRadius:m.role==='user'?'11px 11px 3px 11px':'11px 11px 11px 3px'}}>{m.content}</div></div>))}
        {aiLoading&&<div style={{display:'flex',alignItems:'center',gap:9}}><div style={{display:'flex',gap:4}}>{[0,.15,.3].map((d,i)=><div key={i} style={{width:5,height:5,borderRadius:'50%',background:C.accent,animation:`blink 1s ${d}s infinite`}}/>)}</div><span style={{fontSize:11.5,color:C.textMuted}}>Analyzing…</span></div>}
        <div ref={chatEndRef}/>
      </div>
      <div style={{padding:'12px 14px',borderTop:`1px solid ${C.border}`,display:'flex',gap:9}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&send(input)} placeholder={ready?'Ask about Mantle DeFi…':'Loading…'} disabled={!ready||aiLoading} style={{flex:1,background:C.surfaceAlt,border:`1px solid ${C.borderLight}`,borderRadius:7,padding:'8px 12px',color:C.text,fontSize:13,outline:'none',opacity:ready?1:0.5}}/>
        <button onClick={()=>send(input)} disabled={!ready||aiLoading||!input.trim()} style={{background:C.accent,color:'#07080C',border:'none',borderRadius:7,padding:'8px 16px',fontSize:12.5,fontWeight:700,cursor:'pointer',opacity:!ready||aiLoading||!input.trim()?0.4:1}}>Ask</button>
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>

/* ─── PORTFOLIO ─── */
function DonutChart({items}){
  if(!items||items.length===0)return null;
  const cx=90,cy=90,outerR=78,innerR=48;let angle=-Math.PI/2;
  const total=items.reduce((s,i)=>s+i.pct,0)||1;
  return(<svg width="180" height="180" viewBox="0 0 180 180">{items.map((item,idx)=>{const frac=item.pct/total;if(frac<=0.001)return null;const sweep=frac*2*Math.PI;const startA=angle;const endA=angle+sweep;angle=endA;const c1=Math.cos(startA),s1=Math.sin(startA),c2=Math.cos(endA),s2=Math.sin(endA);const large=sweep>Math.PI?1:0;const d=`M ${cx+outerR*c1} ${cy+outerR*s1} A ${outerR} ${outerR} 0 ${large} 1 ${cx+outerR*c2} ${cy+outerR*s2} L ${cx+innerR*c2} ${cy+innerR*s2} A ${innerR} ${innerR} 0 ${large} 0 ${cx+innerR*c1} ${cy+innerR*s1} Z`;return<path key={idx} d={d} fill={item.color} opacity="0.9"/>;})}<circle cx={cx} cy={cy} r={innerR} fill="#0F1117"/></svg>);
}

        {selected.length===0?(<div style={{textAlign:'center',padding:'20px 0',color:C.textMuted}}><div style={{fontSize:28,marginBottom:10}}>📊</div><div style={{fontSize:13}}>Select pools to build your portfolio</div></div>):(<>
          <div style={{display:'flex',justifyContent:'center',marginBottom:16}}><DonutChart items={donutItems}/></div>
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16}}>{donutItems.map((item,i)=>(<div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}><div style={{width:10,height:10,borderRadius:2,background:item.color,flexShrink:0}}/><span style={{flex:1,color:C.textMuted}}>{item.label}</span><span style={{color:C.text,fontWeight:600}}>{item.pct.toFixed(0)}%</span></div>))}</div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,display:'flex',flexDirection:'column',gap:8}}>
            {[{l:'Blended APY',v:fmtPct(blendedAPY),c:blendedAPY>20?C.yellow:C.accent},{l:'Total Pool TVL',v:fmt(totalTVL),c:C.text},{l:'Pools Selected',v:`${selected.length}`,c:C.text},{l:'Total Allocated',v:`${totalAlloc.toFixed(0)}%`,c:totalAlloc>100?C.red:totalAlloc===100?C.green:C.yellow}].map(m=>(<div key={m.l} style={{display:'flex',justifyContent:'space-between',fontSize:12.5}}><span style={{color:C.textMuted}}>{m.l}</span><span style={{fontWeight:700,fontFamily:'monospace',color:m.c}}>{m.v}</span></div>))}
          </div>
          {hasHighRisk&&<div style={{marginTop:12,background:C.redDim,border:`1px solid rgba(255,77,109,0.2)`,borderRadius:8,padding:'9px 12px',fontSize:11.5,color:C.red}}>⚠ Portfolio contains high-risk pools. Review risk flags before depositing.</div>}
        </>)}
      </div>
      <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:11,padding:14,fontSize:11.5,color:C.textMuted,lineHeight:1.6}}>⚠ Blended APY excludes compounding, fees, and IL. Rates fluctuate. Not financial advice. DYOR.</div>
    </div>
  </div>);
}

/* ─── MAIN APP ─── */
const TABS=[['dashboard','Dashboard'],['research','AI Research'],['yields','Yields'],['calculator','Calculator'],['tvlchart','TVL Chart'],['rwaflow','RWA Flow'],['portfolio','Portfolio']];

function MantleIQ(){
  const[tab,setTab]=useState('dashboard');
  const[data,setData]=useState(null);const[loading,setLoading]=useState(true);const[fetchError,setFetchError]=useState(null);
  const[messages,setMessages]=useState([]);const[input,setInput]=useState('');const[aiLoading,setAiLoading]=useState(false);
  const chatEndRef=useRef(null);

  useEffect(()=>{fetchMantleData().then(setData).catch(e=>setFetchError(e.message)).finally(()=>setLoading(false));},[]);
  useEffect(()=>{chatEndRef.current?.scrollIntoView({behavior:'smooth'});},[messages,aiLoading]);

  const send=async(text)=>{const q=text.trim();if(!q||aiLoading||!data)return;const next=[...messages,{role:'user',content:q}];setMessages(next);setInput('');setAiLoading(true);try{const reply=await askClaude(next,data);setMessages(prev=>[...prev,{role:'assistant',content:reply}]);}catch{setMessages(prev=>[...prev,{role:'assistant',content:'Something went wrong.'}]);}finally{setAiLoading(false);};};
  const ready=!loading&&!!data;

  return(<div style={{background:C.bg,minHeight:'100vh',color:C.text}}>
    <div style={{borderBottom:`1px solid ${C.border}`,padding:'0 24px',height:54,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:11}}><LogoIcon size={32}/><div><div style={{fontWeight:700,fontSize:14.5,letterSpacing:'-0.4px'}}>MantleIQ</div><div style={{fontSize:9.5,color:C.textMuted,letterSpacing:'0.9px',textTransform:'uppercase'}}>Research Co-Pilot</div></div></div>
      <div style={{display:'flex',alignItems:'center',gap:7}}>
        <div style={{width:7,height:7,borderRadius:'50%',background:loading?C.yellow:fetchError?C.red:C.accent,boxShadow:(!loading&&!fetchError)?`0 0 6px ${C.accent}`:'none',animation:loading?'blink 1s infinite':'none'}}/>
        <span style={{fontSize:11,color:C.textMuted}}>{loading?'Fetching live data…':fetchError?'Data error':`Live · ${data?.protocols?.length||0} protocols`}</span>
      </div>
    </div>
    <div className="tab-nav" style={{borderBottom:`1px solid ${C.border}`,padding:'0 24px'}}>
      {TABS.map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{background:'none',border:'none',cursor:'pointer',padding:'11px 14px',marginBottom:-1,color:tab===id?C.accent:C.textMuted,fontSize:12.5,fontWeight:tab===id?600:400,borderBottom:tab===id?`2px solid ${C.accent}`:'2px solid transparent',transition:'color 0.15s',whiteSpace:'nowrap'}}>{label}</button>))}
    </div>
    <div style={{padding:'22px',maxWidth:1060,margin:'0 auto'}}>
      {tab==='dashboard'&&<Dashboard data={data} loading={loading} fetchError={fetchError}/>}
      {tab==='research'&&<Research data={data} ready={ready} messages={messages} input={input} setInput={setInput} send={send} aiLoading={aiLoading} chatEndRef={chatEndRef}/>}
      {tab==='yields'&&<Yields data={data} loading={loading}/>}
      {tab==='calculator'&&<Calculator data={data} loading={loading}/>}
      {tab==='tvlchart'&&<TVLChart data={data} loading={loading}/>}
      {tab==='rwaflow'&&<RWAFlow/>}
      {tab==='portfolio'&&<Portfolio data={data} loading={loading}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<MantleIQ/>);
</script>
</body>
</html>
